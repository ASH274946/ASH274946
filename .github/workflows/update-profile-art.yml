name: Update profile art

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 0 * * *" # Run once a day at midnight
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Generate profile SVGs
        env:
          GH_PROFILE_USER: ASH274946
        run: |
          python scripts/fetch_contributions.py
          python scripts/render_heatmap_svg.py
          python scripts/make_info_card.py

      - name: Commit and push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/contributions.json contrib-heatmap.svg info-card.svg
          git commit -m "chore: auto-update profile SVGs" || exit 0
          git push
